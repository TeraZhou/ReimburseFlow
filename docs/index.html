<body>
  <div id="app">

    <nav id="bottom-nav" class="bottom-nav">

        <span>首页</span>

    </nav>
  </div>

  <!-- Image Viewer Modal -->
  <div id="image-viewer" class="modal" onclick="this.classList.remove('active')">
    <div class="modal-backdrop"></div>
    <img id="image-viewer-img" src="" alt="">
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-dialog" class="modal">
    <div class="modal-backdrop" onclick="closeConfirmDialog()"></div>
    <div class="confirm-box">
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="closeConfirmDialog()">取消</button>
        <button class="btn-danger" id="confirm-ok" onclick="closeConfirmDialog()">确定</button>
      </div>
    </div>
  </div>

  <script src="js/db.js?v=8"></script>
  <script src="js/utils.js?v=8"></script>
  <script src="js/services/category.js?v=8"></script>
  <script src="js/services/transaction.js?v=8"></script>
  <script src="js/services/invoice.js?v=8"></script>
  <script src="js/services/ocr.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
</body>
</html>
